name: release-classic
run-name: "release OpenCode Classic v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Stable SemVer without a leading v"
        required: true
        type: string
      sha:
        description: "Approved main commit SHA"
        required: true
        type: string

concurrency: release-classic-${{ inputs.version }}

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    if: github.repository == 'LogicLyra/opencode-classic' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment: release-draft
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Validate release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          APPROVED_SHA: ${{ inputs.sha }}
        run: |
          test "$GITHUB_SHA" = "$APPROVED_SHA"
          test "$(git rev-parse origin/main)" = "$APPROVED_SHA"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be a stable SemVer without a leading v"
            exit 1
          fi

          # shellcheck disable=SC2016
          VERSION="$VERSION" bun -e 'for (const file of ["packages/opencode/package.json", "packages/desktop/package.json"]) { const pkg = await Bun.file(file).json(); if (pkg.version !== process.env.VERSION) throw new Error(`${file} is ${pkg.version}, expected ${process.env.VERSION}`) }'

          published=$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" --jq '.[] | select(.draft == false and .prerelease == false) | .tag_name')
          # shellcheck disable=SC2016
          highest=$(RELEASE_TAGS="$published" bun -e 'import semver from "semver"; const versions = (process.env.RELEASE_TAGS ?? "").split(/\s+/).map((tag) => tag.replace(/^v/, "")).filter((version) => semver.valid(version)); process.stdout.write(versions.sort(semver.rcompare)[0] ?? "")')
          if [[ -n "$highest" ]]; then
            # shellcheck disable=SC2016
            HIGHEST="$highest" bun -e 'import semver from "semver"; if (!semver.gt(process.env.VERSION, process.env.HIGHEST)) throw new Error(`${process.env.VERSION} must be newer than ${process.env.HIGHEST}`)'
          fi

          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists; drafts are immutable and must be reviewed or deleted explicitly"
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          if ! gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "v$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "OpenCode Classic v$VERSION" \
              --notes "OpenCode Classic v$VERSION" \
              --draft
          fi

      - name: Build and upload CLI archives
        working-directory: packages/opencode
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          OPENCODE_RELEASE: "1"
          OPENCODE_UPLOAD: "0"
          OPENCODE_VERSION: ${{ inputs.version }}
        run: bun run script/build.ts

      - name: Upload CLI archives
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release upload "v$VERSION" packages/opencode/dist/*.zip packages/opencode/dist/*.tar.gz --repo "$GITHUB_REPOSITORY"

      - name: Upload release installer
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release upload "v$VERSION" install --repo "$GITHUB_REPOSITORY"

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm

      - name: Prepare desktop
        working-directory: packages/desktop
        env:
          OPENCODE_CHANNEL: prod
          OPENCODE_VERSION: ${{ inputs.version }}
          RUST_TARGET: x86_64-unknown-linux-gnu
        run: bun ./scripts/prepare.ts

      - name: Build desktop
        working-directory: packages/desktop
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          OPENCODE_CHANNEL: prod
          OPENCODE_VERSION: ${{ inputs.version }}
        run: bun run build

      - name: Package Linux x64 desktop
        working-directory: packages/desktop
        env:
          OPENCODE_CHANNEL: prod
        run: bun x electron-builder --linux --x64 --publish never --config electron-builder.config.ts

      - name: Upload desktop assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          shopt -s nullglob
          files=(packages/desktop/dist/*.{deb,rpm})
          if (( ${#files[@]} == 0 )); then
            echo "No Linux desktop assets found"
            exit 1
          fi
          gh release upload "v$VERSION" "${files[@]}" --repo "$GITHUB_REPOSITORY"

      - name: Verify and upload updater metadata
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          metadata=packages/desktop/dist/latest-linux.yml
          provider=packages/desktop/dist/linux-unpacked/resources/app-update.yml
          test -f "$metadata"
          test -f "$provider"
          # shellcheck disable=SC2016
          VERSION="$VERSION" bun -e 'const text = await Bun.file("packages/desktop/dist/latest-linux.yml").text(); if (!text.includes(`version: ${process.env.VERSION}`)) throw new Error("Updater metadata version mismatch"); for (const ext of [".deb", ".rpm"]) if (!text.includes(ext)) throw new Error(`Updater metadata does not reference ${ext}`); if (text.toLowerCase().includes("appimage")) throw new Error("Updater metadata unexpectedly references AppImage")'
          # shellcheck disable=SC2016
          bun -e 'const text = await Bun.file("packages/desktop/dist/linux-unpacked/resources/app-update.yml").text(); for (const expected of ["owner: LogicLyra", "repo: opencode-classic", "updaterCacheDirName: opencode-classic-desktop-updater"]) if (!text.includes(expected)) throw new Error(`Missing updater provider setting: ${expected}`)'
          gh release upload "v$VERSION" "$metadata" --repo "$GITHUB_REPOSITORY"

      - name: Generate and upload checksums
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          shopt -s nullglob
          files=(
            install
            packages/opencode/dist/*.zip
            packages/opencode/dist/*.tar.gz
            packages/desktop/dist/*.deb
            packages/desktop/dist/*.rpm
            packages/desktop/dist/latest-linux.yml
          )
          if (( ${#files[@]} == 0 )); then
            echo "No release files found for checksums"
            exit 1
          fi
          : > SHA256SUMS
          for file in "${files[@]}"; do
            read -r hash _ < <(sha256sum "$file")
            printf '%s  %s\n' "$hash" "$(basename "$file")" >> SHA256SUMS
          done
          gh release upload "v$VERSION" SHA256SUMS --repo "$GITHUB_REPOSITORY"

      - name: Attest release provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            install
            SHA256SUMS
            packages/opencode/dist/*.zip
            packages/opencode/dist/*.tar.gz
            packages/desktop/dist/*.deb
            packages/desktop/dist/*.rpm
            packages/desktop/dist/latest-linux.yml

      - name: Verify release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          assets=$(gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')
          for required in install SHA256SUMS opencode-linux-x64.tar.gz opencode-linux-x64-baseline.tar.gz opencode-classic-desktop-linux-amd64.deb opencode-classic-desktop-linux-x86_64.rpm latest-linux.yml; do
            if ! grep -Fxq "$required" <<<"$assets"; then
              echo "Missing release asset: $required"
              exit 1
            fi
          done
